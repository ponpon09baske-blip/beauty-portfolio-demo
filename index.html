<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美容師ポートフォリオ — デモ一覧</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif; background: #f5f5f5; color: #1a1a1a; }

  header { background: white; border-bottom: 1px solid #e8e8e8; padding: 24px 48px; }
  header h1 { font-size: 20px; font-weight: 600; }
  header p { font-size: 14px; color: #888; margin-top: 4px; }

  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; padding: 48px; max-width: 1200px; margin: 0 auto; }

  .card {
    background: white; border-radius: 12px; overflow: hidden;
    text-decoration: none; color: inherit;
    border: 1px solid #e8e8e8;
    transition: box-shadow 0.2s, transform 0.2s;
  }
  .card:hover { box-shadow: 0 8px 32px rgba(0,0,0,0.1); transform: translateY(-2px); }

  .preview {
    height: 200px; display: flex; align-items: center; justify-content: center;
    font-size: 48px;
  }
  .p1 { background: linear-gradient(135deg, #f0ede8, #c9a96e); }
  .p2 { background: linear-gradient(135deg, #faf6f0, #7a9b76); }
  .p3 { background: linear-gradient(135deg, #0d0d0d, #ff3d8a); }
  .p4 { background: linear-gradient(135deg, #f7f7f7, #2563eb); }

  .card-body { padding: 24px; }
  .card-num { font-size: 11px; color: #aaa; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 6px; }
  .card-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
  .card-desc { font-size: 14px; color: #666; line-height: 1.6; margin-bottom: 16px; }
  .tags { display: flex; gap: 8px; flex-wrap: wrap; }
  .tag { padding: 4px 10px; background: #f0f0f0; border-radius: 16px; font-size: 12px; color: #555; }

  @media (max-width: 768px) {
    .grid { grid-template-columns: 1fr; padding: 20px; }
    header { padding: 20px; }
  }
</style>
</head>
<body>

<header>
  <h1>美容師ポートフォリオ — デモ一覧</h1>
  <p>2種類のデザインテイストを比較できます。クリックして各デモを確認してください。</p>
</header>

<div class="grid">
  <a href="01-minimal-luxury.html" class="card">
    <div class="preview p1">✂</div>
    <div class="card-body">
      <p class="card-num">01</p>
      <h2 class="card-title">ミニマル × 高級感</h2>
      <div class="tags"><span class="tag">モノクロ</span><span class="tag">高級感</span><span class="tag">セリフ体</span></div>
    </div>
  </a>


<a href="04-clean-simple.html" class="card">
    <div class="preview p4">📋</div>
    <div class="card-body">
      <p class="card-num">02</p>
      <h2 class="card-title">クリーン × シンプル</h2>
      <div class="tags"><span class="tag">白ベース</span><span class="tag">整然</span><span class="tag">信頼感</span></div>
    </div>
  </a>
</div>

</body>
</html>
